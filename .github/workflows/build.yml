name: Build Project

on:
    pull_request :
        branches: [master]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '25'
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6
              with:
                gradle-version: '9.6.0'
            - name: Change wrapper permissions
              run: chmod +x ./gradlew
            - name: Build with Gradle
              run: ./gradlew build